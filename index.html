<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星空 · 诗境世界</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="bg"></div>
<canvas id="stars"></canvas>

<!-- 🌠 诗句容器 -->
<div id="poetry-container"></div>

<!-- ⚙ 悬浮按钮 -->
<div id="settingsBtn">⚙</div>

<!-- 📱 设置面板 -->
<div id="panel" class="hide">
  <input id="input" placeholder="输入诗句...">

  <button id="addBtn">添加诗句</button>
  <button id="musicBtn">🎵 音乐</button>
  <button id="clearBtn">清空诗句</button>

  <div id="count">0 首诗</div>
</div>

<!-- 🎧 音乐 -->
<audio id="bgm" src="music/bgm.mp3" loop></audio>

<script src="js/stars.js"></script>
<script src="js/poetry.js"></script>
<script src="js/music.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
